<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CyberGuard Italia — 5T3C4V78</title>

<link rel="canonical" href="https://osensei78.github.io/cyberguard/">
<link rel="manifest" href="https://osensei78.github.io/cyberguard/manifest.json">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CyberGuard">
<link rel="apple-touch-icon" href="https://osensei78.github.io/cyberguard/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="https://osensei78.github.io/cyberguard/icon-192.png">
<link rel="apple-touch-startup-image" href="https://osensei78.github.io/cyberguard/icon-512.png">
<meta name="description" content="Impara a riconoscere e difenderti dalle truffe digitali più diffuse in Italia.">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020a02;--surface:#050f05;--surface2:#0a1a0a;
  --border:#0d3d0d;--border2:#1a5c1a;
  --accent:#00ff41;--accent2:#00cc33;--accent-dim:#004d14;
  --cyan:#00f5ff;--cyan-dim:#003d40;
  --red:#ff0033;--red-dim:#3d000d;--yellow:#ffcc00;--orange:#ff6600;
  --text:#b0ffb0;--text2:#5a9a5a;--text3:#2d5c2d;
  --mono:'JetBrains Mono','Share Tech Mono',monospace;
  --display:'Orbitron',monospace;
}
body.light-mode{
  --bg:#f0f7f0;--surface:#ffffff;--surface2:#e8f5e8;
  --border:#b8d4b8;--border2:#7ab87a;
  --accent:#007a1f;--accent2:#005a16;--accent-dim:#c8e6c8;
  --cyan:#0077aa;--cyan-dim:#cce8f4;
  --red:#cc0022;--red-dim:#fce8ea;--yellow:#b38600;--orange:#c05000;
  --text:#1a3a1a;--text2:#2d6b2d;--text3:#4a8a4a;
  --mono:'JetBrains Mono','Share Tech Mono',monospace;
  --display:'Orbitron',monospace;
}

/* FIX: Miglioramento visibilità sezioni in Light Mode */
body.light-mode .q-card, 
body.light-mode .lvl-card, 
body.light-mode .sim-card {
  background: #ffffff !important;
  border-color: #d4ecd4 !important;
}
body.light-mode .qopt {
  background: #f0f7f0 !important;
  color: #1a3a1a !important;
  border-color: #b8d4b8 !important;
}
body.light-mode .sim-intro {
  background: #e0f7fa !important;
  border-color: #b2ebf2 !important;
  color: #006064 !important;
}

body.light-mode::after{background:none;}
body.light-mode .home-banner{background:linear-gradient(135deg,#e8f5e8 0%,#d4ecd4 60%,#dff0df 100%);}
body.light-mode .home-banner-grid{background-image:linear-gradient(rgba(0,122,31,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,122,31,.06) 1px,transparent 1px);}
body.light-mode .home-banner-ico{filter:drop-shadow(0 0 8px rgba(0,122,31,.4));}
body.light-mode .home-banner-title{text-shadow:0 0 8px rgba(0,122,31,.3);}
body.light-mode .tb-logo{box-shadow:0 0 6px rgba(0,122,31,.2),inset 0 0 4px rgba(0,122,31,.05);}
body.light-mode .b-url{color:var(--red);}
body.light-mode .b-body{background:#f8fff8;}
body.light-mode .b-bar{background:#e0ede0;}
body.light-mode .sms-wrap{background:#f0f7f0;}
body.light-mode .call-wrap{background:#ffffff;}
body.light-mode .q-card{background:#ffffff;}
body.light-mode .qopt{background:#f8fff8;}
body.light-mode #tabbar{box-shadow:0 -2px 8px rgba(0,0,0,.06);}

/* THEME TOGGLE SWITCH */
.theme-toggle{display:flex;align-items:center;gap:6px;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:2px 4px;}
.toggle-ico{font-size:.85rem;line-height:1;transition:opacity .2s;}
.toggle-track{position:relative;width:40px;height:22px;border-radius:11px;background:var(--accent-dim);border:1.5px solid var(--accent);cursor:pointer;transition:background .3s,border-color .3s;flex-shrink:0;box-shadow:0 0 6px rgba(0,255,65,.2);}
body.light-mode .toggle-track{background:#c8e8c8;border-color:var(--accent);box-shadow:0 0 6px rgba(0,122,30,.2);}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--accent);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 0 5px rgba(0,255,65,.6);}
body.light-mode .toggle-knob{transform:translateX(18px);box-shadow:0 0 5px rgba(0,122,30,.5);}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.012) 2px,rgba(0,255,65,.012) 4px);pointer-events:none;z-index:9999;}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);}
body{font-family:var(--mono);color:var(--text);font-size:13px;display:flex;flex-direction:column;height:100%;height:100dvh;}
button{font-family:var(--mono);}input{font-family:var(--mono);}

@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes glitch{0%,100%{transform:none;text-shadow:0 0 8px var(--accent);}20%{transform:translateX(-2px);text-shadow:-2px 0 var(--cyan),2px 0 var(--red);}40%{transform:translateX(2px);text-shadow:2px 0 var(--cyan),-2px 0 var(--red);}60%{transform:none;text-shadow:0 0 12px var(--accent);}}
@keyframes scanline{0%{top:-10%;}100%{top:110%;}}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(0,255,65,.4);}50%{box-shadow:0 0 0 4px rgba(0,255,65,.1);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes matrix-drop{0%{opacity:0;transform:translateY(-8px);}100%{opacity:1;transform:none;}}
@keyframes pd{0%,100%{opacity:1;}50%{opacity:.2;}}
@keyframes neon-flicker{0%,19%,21%,23%,25%,54%,56%,100%{text-shadow:0 0 4px var(--accent),0 0 12px var(--accent),0 0 24px var(--accent2);}20%,24%,55%{text-shadow:none;}}

/* TOPBAR */
#topbar{flex-shrink:0;height:52px;background:var(--surface);border-bottom:1px solid var(--accent-dim);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative;box-shadow:0 0 20px rgba(0,255,65,.05);}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3;}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-logo{width:32px;height:32px;background:transparent;border:1px solid var(--accent);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:.7rem;font-weight:700;color:var(--accent);flex-shrink:0;box-shadow:0 0 8px rgba(0,255,65,.3),inset 0 0 8px rgba(0,255,65,.05);animation:pulse-border 3s infinite;}
.tb-name{font-family:var(--display);font-size:.75rem;font-weight:700;color:var(--accent);letter-spacing:.08em;text-shadow:0 0 8px rgba(0,255,65,.5);}
.tb-right{display:flex;align-items:center;gap:7px;}
.tb-pill{display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:2px;font-size:.6rem;font-weight:700;font-family:var(--mono);border:1px solid;letter-spacing:.05em;}
.pill-green{background:rgba(0,255,65,.08);color:var(--accent);border-color:rgba(0,255,65,.3);text-shadow:0 0 6px var(--accent);}
.pill-red{background:rgba(255,0,51,.08);color:var(--red);border-color:rgba(255,0,51,.3);}
.pill-red .dot{animation:pd 1.2s infinite;}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
#tb-clock{font-family:var(--mono);font-size:.68rem;color:var(--text2);letter-spacing:.1em;}

/* LAYOUT */
#content{flex:1;overflow:hidden;position:relative;min-height:0;}
.screen{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:scroll;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch;}
.screen.active{display:block;}
.screen::-webkit-scrollbar{width:3px;}
.screen::-webkit-scrollbar-track{background:var(--bg);}
.screen::-webkit-scrollbar-thumb{background:var(--accent-dim);}

/* TABBAR */
#tabbar{flex-shrink:0;background:var(--surface);border-top:1px solid var(--accent-dim);display:flex;padding-bottom:env(safe-area-inset-bottom,0);position:relative;}
#tabbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.25;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px 4px 12px;background:none;border:none;color:var(--text3);font-size:.52rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);cursor:pointer;transition:all .15s;position:relative;-webkit-tap-highlight-color:transparent;}
.tab-ico{font-size:1.5rem;line-height:1;filter:grayscale(.8);}
.tab::after{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .2s;box-shadow:0 0 8px var(--accent);}
.tab.active{color:var(--accent);text-shadow:0 0 6px rgba(0,255,65,.5);}
.tab.active .tab-ico{filter:drop-shadow(0 0 4px var(--accent));}
.tab.active::after{transform:scaleX(1);}
.tab-badge{position:absolute;top:8px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:.48rem;min-width:14px;height:14px;border-radius:2px;display:none;align-items:center;justify-content:center;padding:0 3px;font-family:var(--mono);box-shadow:0 0 6px var(--red);}
.tab-badge.show{display:flex;}

/* SHARED */
.pg{padding:14px;}
.page-header{margin-bottom:14px;}
.page-title{font-family:var(--display);font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:.08em;margin-bottom:3px;text-shadow:0 0 10px rgba(0,255,65,.4);}
.page-title::before{content:'> ';color:var(--text3);font-size:.85rem;}
.page-sub{font-size:.7rem;color:var(--text2);font-family:var(--mono);}
.page-sub::before{content:'// ';color:var(--text3);}
.section-title{font-family:var(--mono);font-size:.6rem;font-weight:700;color:var(--text2);letter-spacing:.15em;text-transform:uppercase;margin:18px 0 7px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'[';color:var(--accent);}
.section-title::after{content:']';color:var(--accent);}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--accent-dim);border-radius:0;margin-bottom:5px;overflow:hidden;transition:all .15s;}
.card:hover{border-left-color:var(--accent);box-shadow:0 0 10px rgba(0,255,65,.06);}
.card.open{border-left-color:var(--accent);border-color:var(--border2);box-shadow:0 0 14px rgba(0,255,65,.08);}
.card-head{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.c-ico{width:36px;height:36px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;border:1px solid;}
.ico-red{background:rgba(255,0,51,.08);border-color:rgba(255,0,51,.2);}
.ico-orange{background:rgba(255,102,0,.08);border-color:rgba(255,102,0,.2);}
.ico-yellow{background:rgba(255,204,0,.08);border-color:rgba(255,204,0,.2);}
.ico-blue{background:rgba(0,245,255,.08);border-color:rgba(0,245,255,.2);}
.ico-purple{background:rgba(180,0,255,.08);border-color:rgba(180,0,255,.2);}
.ico-green{background:rgba(0,255,65,.08);border-color:rgba(0,255,65,.2);}
.c-body{flex:1;min-width:0;}
.c-label{font-size:.56rem;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;font-family:var(--mono);}
.c-label::before{content:'# ';color:var(--accent-dim);}
.c-title{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:2px;font-family:var(--mono);}
.c-desc{font-size:.72rem;color:var(--text2);line-height:1.5;font-family:var(--mono);}
.c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.badge{font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.08em;font-family:var(--mono);border:1px solid;}
.badge-red{background:rgba(255,0,51,.1);color:#ff3355;border-color:rgba(255,0,51,.3);}
.badge-orange{background:rgba(255,102,0,.1);color:#ff6600;border-color:rgba(255,102,0,.3);}
.badge-yellow{background:rgba(255,204,0,.1);color:#ffcc00;border-color:rgba(255,204,0,.3);}
.c-chevron{color:var(--text3);font-size:.7rem;transition:transform .2s;flex-shrink:0;margin-top:1px;}
.card.open .c-chevron{transform:rotate(180deg);color:var(--accent);}

/* DETAIL */
.detail{display:none;border-top:1px solid var(--border);padding:12px 14px;background:rgba(0,15,0,.6);}
.detail.open{display:block;animation:fadeUp .2s ease;}

/* HOME BANNER */
.home-banner{margin:14px;margin-top:16px;border-radius:0;overflow:hidden;border:1px solid var(--border2);border-left:3px solid var(--accent);position:relative;background:linear-gradient(135deg,#000a00 0%,#001400 60%,#000800 100%);min-height:145px;display:flex;align-items:center;padding:18px 18px;gap:14px;box-shadow:0 0 30px rgba(0,255,65,.08),inset 0 0 30px rgba(0,255,65,.03);}

/* FIX: Ripristino visualizzazione sezioni Quiz e Alert */
.level-tabs, .sim-tabs {
  display: block; /* Modificato da none a block per permettere la visibilità */
  animation: fadeUp 0.3s ease;
}

.sim-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:12px;}
.sim-card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--accent-dim);border-radius:0;padding:11px 10px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px;font-family:var(--mono);-webkit-tap-highlight-color:transparent;}

/* Altri stili... */
</style>
</head>
<body class="dark-mode"> <div id="topbar">
  <div class="tb-brand">
    <div class="tb-logo">CG</div>
    <div class="tb-name">CYBERGUARD</div>
  </div>
  <div class="tb-right">
    <div class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-ico" class="toggle-ico">🌙</span>
      <div class="toggle-track"><div class="toggle-knob"></div></div>
    </div>
  </div>
</div>

<div id="content">
  <div id="home" class="screen active">
    <div class="home-banner">
       <div class="home-banner-grid"></div>
       <div class="home-banner-text">
         <div class="home-banner-label">SISTEMA ATTIVO</div>
         <div class="home-banner-title">Difendi la tua <span>Identità</span></div>
         <p class="home-banner-desc">Impara a riconoscere le minacce digitali.</p>
       </div>
       <div class="home-banner-ico">🛡️</div>
    </div>
    </div>

  <div id="quiz" class="screen">
    <div class="pg">
      <header class="page-header">
        <h1 class="page-title">TEST DI SICUREZZA</h1>
        <p class="page-sub">Metti alla prova le tue conoscenze</p>
      </header>
      <div class="level-tabs">
        </div>
    </div>
  </div>

  <div id="alerts" class="screen">
    <div class="pg">
      <header class="page-header">
        <h1 class="page-title">SIMULAZIONI</h1>
        <p class="page-sub">Esercitati con scenari reali</p>
      </header>
      <div class="sim-tabs">
        </div>
    </div>
  </div>
</div>

<nav id="tabbar">
  <button class="tab active" onclick="showScreen('home')">
    <span class="tab-ico">🏠</span>
    <span>Home</span>
  </button>
  <button class="tab" onclick="showScreen('quiz')">
    <span class="tab-ico">🧩</span>
    <span>Quiz</span>
  </button>
  <button class="tab" onclick="showScreen('alerts')">
    <span class="tab-ico">🚨</span>
    <span>Alert</span>
  </button>
</nav>

<script>
// Logica per cambiare schermata
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  
  const target = document.getElementById(id);
  if(target) target.classList.add('active');
  
  // Trova il tab corrispondente e attivalo
  const tabs = document.querySelectorAll('.tab');
  if(id === 'home') tabs[0].classList.add('active');
  if(id === 'quiz') tabs[1].classList.add('active');
  if(id === 'alerts') tabs[2].classList.add('active');
}

// Funzione Tema (già esistente nel tuo file)
function toggleTheme() {
  const isLight = document.body.classList.toggle('light-mode');
  const ico = document.getElementById('theme-ico');
  if(ico) ico.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('cg_theme', isLight ? 'light' : 'dark');
}

// Inizializzazione...
</script>
</body>
</html>
