<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>InvenScan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');
:root {
  --bg:#0d0f0e; --surface:#151918; --card:#1c211f; --border:#2a332f;
  --accent:#00e87a; --accent-dim:#00e87a22; --accent-mid:#00e87a55;
  --text:#e8efe9; --muted:#5a6b61; --danger:#ff4d4d; --warn:#ffb020;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.item-count{background:var(--accent-dim);border:1px solid var(--accent-mid);color:var(--accent);font-size:0.7rem;padding:3px 10px;border-radius:20px;letter-spacing:1px}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px;text-align:center;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-dim)}
.page{display:none;padding:20px}
.page.active{display:block}

/* SCAN AREA */
.scan-area{width:100%;max-width:480px;margin:0 auto 16px;border-radius:16px;overflow:hidden;border:2px solid var(--border);background:#000;aspect-ratio:4/3;position:relative;display:none}
.scan-area video{width:100%;height:100%;object-fit:cover;display:block}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:80%;height:45%;border:2px solid var(--accent);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);position:relative}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanLine 2s ease-in-out infinite}
@keyframes scanLine{0%,100%{top:0}50%{top:calc(100% - 2px)}}
.corner{position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid}
.corner.tl{top:-2px;left:-2px;border-width:3px 0 0 3px}
.corner.tr{top:-2px;right:-2px;border-width:3px 3px 0 0}
.corner.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px}
.corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0}

.idle-area{width:100%;max-width:480px;margin:0 auto 16px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--surface);border:2px dashed var(--border);border-radius:16px;cursor:pointer;transition:all 0.2s}
.idle-area:hover{border-color:var(--accent);background:var(--accent-dim)}
.idle-area p{color:var(--muted);font-size:0.8rem;letter-spacing:1px;text-align:center}

/* BUTTONS */
.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.85rem;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.2s;font-weight:500}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:active{filter:brightness(0.9)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-accent{background:transparent;color:var(--accent);border:1px solid var(--accent-mid)}
.btn-sm{padding:10px;font-size:0.75rem}
.btn-stop{max-width:480px;margin:0 auto 16px;display:block;padding:11px;background:var(--surface);border:1px solid var(--accent-mid);border-radius:10px;color:var(--accent);cursor:pointer;font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;text-align:center;width:100%}

/* FORM */
.form-group{margin-bottom:14px}
label{display:block;font-size:0.7rem;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
input,select{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;outline:none;transition:all 0.2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);background:var(--accent-dim)}
input::placeholder{color:var(--muted)}
select option{background:var(--surface)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gap{height:12px}

/* PHOTO PREVIEW */
.photo-preview{width:100%;max-width:480px;margin:0 auto 16px;border-radius:12px;overflow:hidden;border:2px solid var(--accent-mid);display:none}
.photo-preview img{width:100%;display:block}
.ai-status{text-align:center;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;display:none}
.ai-status p{color:var(--accent);font-size:0.8rem;letter-spacing:1px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center}
.stat-val{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:0.65rem;color:var(--muted);letter-spacing:1px;margin-top:2px}

/* LIST */
.search-bar{display:flex;gap:10px;margin-bottom:16px}
.search-bar input{flex:1}
.inv-list{display:flex;flex-direction:column;gap:10px}
.inv-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:flex-start;gap:12px;animation:itemIn 0.3s ease}
@keyframes itemIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.inv-item.low{border-left:3px solid var(--warn)}
.inv-item.zero{border-left:3px solid var(--danger)}
.item-icon{width:40px;height:40px;border-radius:10px;background:var(--accent-dim);border:1px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-family:'Syne',sans-serif;font-weight:600;font-size:0.95rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-bc{font-size:0.7rem;color:var(--muted);margin-bottom:6px}
.item-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:0.65rem;padding:2px 8px;border-radius:20px}
.b-cat{background:#1e2d2a;color:#4db88a;border:1px solid #2a4a3a}
.b-qty{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.b-low{background:#2d2200;border:1px solid #5a4000;color:var(--warn)}
.b-zero{background:#2d0a0a;border:1px solid #5a1a1a;color:var(--danger)}
.qty-btns{display:flex;gap:6px;align-items:center;flex-shrink:0}
.q-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.q-btn:active{border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .ico{font-size:3rem;margin-bottom:12px;opacity:0.4}
.empty p{font-size:0.8rem;letter-spacing:1px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:600px;padding:24px 20px 40px;animation:slideUp 0.3s ease;max-height:90dvh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}
.modal h2{font-family:'Syne',sans-serif;font-size:1.1rem;margin-bottom:20px}
.modal-row{display:flex;gap:10px;margin-top:16px}
.modal-row .btn{flex:1}

/* FLASH */
.flash{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:0.8rem;z-index:999;animation:flashIn 0.3s ease;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
.flash.ok{background:var(--accent);color:#000}
.flash.err{background:var(--danger);color:#fff}
@keyframes flashIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="logo">Inven<span>Scan</span></div>
  <div class="item-count" id="hCount">0 ARTICOLI</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="goTab('scan')">📷 Scansiona</div>
  <div class="tab" onclick="goTab('inventory')">📦 Inventario</div>
  <div class="tab" onclick="goTab('export')">📤 Esporta</div>
</div>

<!-- SCAN -->
<div class="page active" id="page-scan">

  <!-- idle -->
  <div class="idle-area" id="idleArea" onclick="startCamera()">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00e87a" stroke-width="1.5" opacity=".7">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M7 7h2v10H7zM11 7h1v10h-1zM13 7h1v10h-1zM15 7h2v10h-2z"/>
    </svg>
    <p>Tocca per attivare<br>la fotocamera live</p>
  </div>

  <!-- live camera -->
  <div class="scan-area" id="scanArea">
    <video id="video" playsinline autoplay muted></video>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="scan-line"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
    </div>
  </div>
  <button class="btn-stop" id="stopBtn" style="display:none" onclick="stopCamera()">⏹ Ferma fotocamera</button>

  <!-- action buttons -->
  <div id="actionBtns" style="display:flex;flex-direction:column;gap:10px;max-width:480px;margin:0 auto">
    <button class="btn btn-accent btn-sm" onclick="triggerPhoto()">🤖 Scatta foto → AI legge l'etichetta</button>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
    <button class="btn btn-ghost btn-sm" onclick="manualEntry()">✏️ Inserimento manuale</button>
  </div>

  <!-- AI status -->
  <div class="ai-status" id="aiStatus"><p>🔍 AI sta leggendo l'etichetta…</p></div>

  <!-- photo preview -->
  <div class="photo-preview" id="photoPreview"><img id="previewImg" src="" alt=""></div>

  <!-- form -->
  <div id="scanForm" style="display:none;margin-top:16px">
    <div class="form-group">
      <label>Codice articolo</label>
      <input type="text" id="fBarcode" placeholder="Codice rilevato">
    </div>
    <div class="form-group">
      <label>Nome prodotto</label>
      <input type="text" id="fName" placeholder="Es. Valvola M6, Vite TC">
    </div>
    <div class="row2">
      <div class="form-group"><label>Quantità</label><input type="number" id="fQty" value="1" min="0"></div>
      <div class="form-group"><label>Scorta min.</label><input type="number" id="fMin" value="5" min="0"></div>
    </div>
    <div class="row2">
      <div class="form-group">
        <label>Categoria</label>
        <select id="fCat">
          <option>Generale</option><option>Elettronica</option><option>Meccanica</option>
          <option>Consumabili</option><option>Imballaggio</option><option>Utensili</option>
          <option>Materie prime</option><option>Altro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Unità</label>
        <select id="fUnit"><option>pz</option><option>kg</option><option>g</option><option>m</option><option>cm</option><option>L</option><option>conf</option></select>
      </div>
    </div>
    <div class="form-group"><label>Note</label><input type="text" id="fNotes" placeholder="Opzionale"></div>
    <button class="btn btn-primary" onclick="saveItem()">💾 Salva in inventario</button>
    <div class="gap"></div>
    <button class="btn btn-ghost" onclick="resetForm()">✕ Annulla</button>
  </div>
</div>

<!-- INVENTORY -->
<div class="page" id="page-inventory">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">Articoli</div></div>
    <div class="stat-card"><div class="stat-val" id="sLow" style="color:var(--warn)">0</div><div class="stat-lbl">Scorte basse</div></div>
    <div class="stat-card"><div class="stat-val" id="sZero" style="color:var(--danger)">0</div><div class="stat-lbl">Esauriti</div></div>
  </div>
  <div class="search-bar"><input type="text" id="searchQ" placeholder="Cerca nome o codice…" oninput="renderList()"></div>
  <div class="inv-list" id="invList"><div class="empty"><div class="ico">📭</div><p>Nessun articolo<br>Vai su Scansiona per iniziare</p></div></div>
</div>

<!-- EXPORT -->
<div class="page" id="page-export">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="eTotal">0</div><div class="stat-lbl">Articoli</div></div>
    <div class="stat-card"><div class="stat-val" id="eLow" style="color:var(--warn)">0</div><div class="stat-lbl">Scorte basse</div></div>
    <div class="stat-card"><div class="stat-val" id="eZero" style="color:var(--danger)">0</div><div class="stat-lbl">Esauriti</div></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button class="btn btn-primary" onclick="exportCSV()">⬇ Scarica CSV</button>
    <button class="btn btn-ghost" onclick="exportJSON()">⬇ Scarica JSON</button>
    <button class="btn btn-ghost" onclick="copyClip()">📋 Copia negli appunti</button>
    <div class="gap"></div>
    <button class="btn btn-ghost" style="color:var(--danger);border-color:var(--danger)" onclick="clearAll()">🗑 Cancella tutto</button>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="mTitle"></h2>
    <div class="form-group"><label>Nome</label><input id="mName" type="text"></div>
    <div class="row2">
      <div class="form-group"><label>Quantità</label><input id="mQty" type="number" min="0"></div>
      <div class="form-group"><label>Scorta min.</label><input id="mMin" type="number" min="0"></div>
    </div>
    <div class="row2">
      <div class="form-group">
        <label>Categoria</label>
        <select id="mCat"><option>Generale</option><option>Elettronica</option><option>Meccanica</option><option>Consumabili</option><option>Imballaggio</option><option>Utensili</option><option>Materie prime</option><option>Altro</option></select>
      </div>
      <div class="form-group">
        <label>Unità</label>
        <select id="mUnit"><option>pz</option><option>kg</option><option>g</option><option>m</option><option>cm</option><option>L</option><option>conf</option></select>
      </div>
    </div>
    <div class="form-group"><label>Note</label><input id="mNotes" type="text"></div>
    <div class="modal-row">
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="saveEdit()">Salva</button>
    </div>
    <div class="gap"></div>
    <button class="btn" style="background:transparent;border:1px solid var(--danger);color:var(--danger)" onclick="deleteItem()">🗑 Elimina</button>
  </div>
</div>

<script type="module">
// ── ZXing ──────────────────────────────────────────────
import { BrowserMultiFormatReader, DecodeHintType, BarcodeFormat }
  from 'https://esm.sh/@zxing/library@0.21.3';

const HINTS = new Map([
  [DecodeHintType.POSSIBLE_FORMATS, [
    BarcodeFormat.CODE_128, BarcodeFormat.CODE_39, BarcodeFormat.CODE_93,
    BarcodeFormat.EAN_13,   BarcodeFormat.EAN_8,   BarcodeFormat.UPC_A,
    BarcodeFormat.UPC_E,    BarcodeFormat.QR_CODE,  BarcodeFormat.DATA_MATRIX,
    BarcodeFormat.ITF,      BarcodeFormat.CODABAR
  ]],
  [DecodeHintType.TRY_HARDER, true]
]);

// ── State ──────────────────────────────────────────────
let inv = JSON.parse(localStorage.getItem('inv9') || '[]');
let zxing = null, stream = null, scanning = false, editIdx = -1;

const EMOJI = {Elettronica:'🔌',Meccanica:'⚙️',Consumabili:'🧴',Imballaggio:'📦',Utensili:'🔧','Materie prime':'🪨',Generale:'📋',Altro:'🏷️'};

function save() { localStorage.setItem('inv9', JSON.stringify(inv)); updateStats(); }

function updateStats() {
  const t=inv.length, l=inv.filter(i=>i.qty>0&&i.qty<=i.min).length, z=inv.filter(i=>i.qty===0).length;
  ['Total','Low','Zero'].forEach((k,i)=>{
    const v=[t,l,z][i];
    ['s','e'].forEach(p=>{ const el=document.getElementById(p+k); if(el) el.textContent=v; });
  });
  document.getElementById('hCount').textContent=t+' ARTICOLI';
}

// ── Tabs ───────────────────────────────────────────────
window.goTab = function(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['scan','inventory','export'][i]===t));
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  if(t==='inventory') renderList();
  if(t==='export') updateStats();
};

// ── Camera ────────────────────────────────────────────
window.startCamera = async function() {
  if(scanning) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    document.getElementById('idleArea').style.display='none';
    document.getElementById('scanArea').style.display='block';
    document.getElementById('stopBtn').style.display='block';
    scanning = true;

    zxing = new BrowserMultiFormatReader(HINTS, {delayBetweenScanAttempts:200});
    let last='', lastT=0;
    zxing.decodeFromStream(stream, video, (result, err)=>{
      if(!result) return;
      const code = result.getText(), now=Date.now();
      if(code===last && now-lastT<2500) return;
      last=code; lastT=now;
      onCode(code);
    });
  } catch(e) {
    flash('Fotocamera non disponibile','err');
  }
};

window.stopCamera = function() {
  if(zxing) { try{zxing.reset();}catch(e){} zxing=null; }
  if(stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  scanning=false;
  document.getElementById('scanArea').style.display='none';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('idleArea').style.display='flex';
};

function onCode(code) {
  stopCamera();
  const ex = inv.findIndex(i=>i.barcode===code);
  if(ex>=0) { inv[ex].qty++; save(); flash('➕ Quantità aggiornata: '+inv[ex].name,'ok'); return; }
  document.getElementById('fBarcode').value = code;
  document.getElementById('fName').value = '';
  showForm();
  flash('✅ Codice: '+code,'ok');
}

// ── AI Photo ──────────────────────────────────────────
window.triggerPhoto = function() {
  document.getElementById('photoInput').click();
};

document.getElementById('photoInput').addEventListener('change', async function() {
  const file = this.files[0];
  if(!file) return;
  this.value='';

  // show preview
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('photoPreview').style.display='block';
  };
  reader.readAsDataURL(file);

  document.getElementById('aiStatus').style.display='block';
  document.getElementById('actionBtns').style.display='none';

  try {
    const b64 = await toBase64(file);
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        messages:[{role:'user', content:[
          {type:'image', source:{type:'base64', media_type: file.type||'image/jpeg', data:b64}},
          {type:'text', text:`Sei un sistema di lettura etichette magazzino. Analizza l'immagine ed estrai:
1. Il codice a barre o codice articolo (sequenza alfanumerica visibile sull'etichetta o sotto al codice a barre)
2. Il nome/descrizione del prodotto
3. La categoria più adatta

Rispondi SOLO con JSON puro, niente markdown:
{"barcode":"...","name":"...","category":"Meccanica"}`}
        ]}]
      })
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    let txt = (data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(txt);

    document.getElementById('fBarcode').value = parsed.barcode||'';
    document.getElementById('fName').value = parsed.name||'';
    if(parsed.category) {
      const sel=document.getElementById('fCat');
      [...sel.options].forEach(o=>{ if(o.value===parsed.category) o.selected=true; });
    }
    showForm();
    flash('✅ Letto: '+(parsed.barcode||parsed.name||'OK'),'ok');

  } catch(e) {
    flash('Errore AI: '+e.message,'err');
    document.getElementById('photoPreview').style.display='none';
  } finally {
    document.getElementById('aiStatus').style.display='none';
    document.getElementById('actionBtns').style.display='flex';
  }
});

function toBase64(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// ── Manual ────────────────────────────────────────────
window.manualEntry = function() {
  document.getElementById('fBarcode').value='';
  document.getElementById('fName').value='';
  document.getElementById('fQty').value=1;
  document.getElementById('fNotes').value='';
  showForm();
  document.getElementById('fBarcode').focus();
};

function showForm() {
  document.getElementById('actionBtns').style.display='none';
  document.getElementById('scanForm').style.display='block';
  stopCamera();
}

window.resetForm = function() {
  document.getElementById('scanForm').style.display='none';
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('actionBtns').style.display='flex';
  document.getElementById('fBarcode').value='';
  document.getElementById('fName').value='';
  document.getElementById('fQty').value=1;
  document.getElementById('fNotes').value='';
};

window.saveItem = function() {
  const name=document.getElementById('fName').value.trim();
  if(!name){flash('Inserisci un nome prodotto','err');return;}
  const barcode=document.getElementById('fBarcode').value.trim()||('MAN-'+Date.now());
  const ex=inv.findIndex(i=>i.barcode===barcode);
  if(ex>=0){
    inv[ex].qty += parseInt(document.getElementById('fQty').value)||1;
    save(); flash('➕ Quantità aggiornata: '+name,'ok');
  } else {
    inv.unshift({id:Date.now(),barcode,name,
      qty:parseInt(document.getElementById('fQty').value)||0,
      min:parseInt(document.getElementById('fMin').value)||0,
      cat:document.getElementById('fCat').value,
      unit:document.getElementById('fUnit').value,
      notes:document.getElementById('fNotes').value,
      addedAt:new Date().toISOString()});
    save(); flash('✅ '+name+' aggiunto!','ok');
  }
  resetForm();
};

// ── Inventory list ────────────────────────────────────
window.renderList = function() {
  const q=(document.getElementById('searchQ')?.value||'').toLowerCase();
  const filtered=inv.filter(i=>i.name.toLowerCase().includes(q)||i.barcode.toLowerCase().includes(q));
  const el=document.getElementById('invList');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="ico">🔍</div><p>Nessun articolo trovato</p></div>';return;}
  el.innerHTML=filtered.map(item=>{
    const idx=inv.indexOf(item);
    const cls=item.qty===0?'zero':item.qty<=item.min&&item.min>0?'low':'';
    const bqc=item.qty===0?'b-zero':item.qty<=item.min&&item.min>0?'b-low':'b-qty';
    return `<div class="inv-item ${cls}">
      <div class="item-icon">${EMOJI[item.cat]||'📋'}</div>
      <div class="item-info" onclick="openModal(${idx})" style="cursor:pointer">
        <div class="item-name">${item.name}</div>
        <div class="item-bc">${item.barcode}</div>
        <div class="item-meta">
          <span class="badge b-cat">${item.cat}</span>
          <span class="badge ${bqc}">${item.qty} ${item.unit}</span>
          ${item.qty<=item.min&&item.min>0?'<span class="badge b-low">⚠ scorta</span>':''}
        </div>
      </div>
      <div class="qty-btns">
        <button class="q-btn" onclick="chQty(${idx},-1)">−</button>
        <button class="q-btn" onclick="chQty(${idx},1)">+</button>
      </div>
    </div>`;
  }).join('');
  updateStats();
};

window.chQty = function(idx,d){ inv[idx].qty=Math.max(0,inv[idx].qty+d); save(); renderList(); };

// ── Modal ─────────────────────────────────────────────
window.openModal = function(idx) {
  editIdx=idx; const i=inv[idx];
  document.getElementById('mTitle').textContent=i.name;
  document.getElementById('mName').value=i.name;
  document.getElementById('mQty').value=i.qty;
  document.getElementById('mMin').value=i.min;
  document.getElementById('mCat').value=i.cat;
  document.getElementById('mUnit').value=i.unit;
  document.getElementById('mNotes').value=i.notes||'';
  document.getElementById('modal').classList.add('open');
};
window.closeModal = function(e) { if(!e||e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('open'); };
window.saveEdit = function() {
  const i=inv[editIdx];
  i.name=document.getElementById('mName').value;
  i.qty=parseInt(document.getElementById('mQty').value)||0;
  i.min=parseInt(document.getElementById('mMin').value)||0;
  i.cat=document.getElementById('mCat').value;
  i.unit=document.getElementById('mUnit').value;
  i.notes=document.getElementById('mNotes').value;
  save(); renderList(); document.getElementById('modal').classList.remove('open'); flash('✅ Aggiornato','ok');
};
window.deleteItem = function() {
  if(!confirm('Eliminare?')) return;
  inv.splice(editIdx,1); save(); renderList();
  document.getElementById('modal').classList.remove('open'); flash('🗑 Eliminato','ok');
};

// ── Export ────────────────────────────────────────────
window.exportCSV = function() {
  if(!inv.length){flash('Inventario vuoto','err');return;}
  const rows=[['Barcode','Nome','Quantità','Unità','Scorta min','Categoria','Note','Data']];
  inv.forEach(i=>rows.push([i.barcode,i.name,i.qty,i.unit,i.min,i.cat,i.notes||'',i.addedAt.split('T')[0]]));
  dl(rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),'inventario.csv','text/csv');
  flash('✅ CSV scaricato','ok');
};
window.exportJSON = function() {
  if(!inv.length){flash('Inventario vuoto','err');return;}
  dl(JSON.stringify(inv,null,2),'inventario.json','application/json');
  flash('✅ JSON scaricato','ok');
};
window.copyClip = function() {
  if(!inv.length){flash('Inventario vuoto','err');return;}
  navigator.clipboard.writeText(inv.map(i=>`[${i.barcode}] ${i.name} — ${i.qty} ${i.unit}`).join('\n'))
    .then(()=>flash('📋 Copiato!','ok')).catch(()=>flash('Errore copia','err'));
};
window.clearAll = function() {
  if(!confirm('Cancellare tutto?')) return;
  inv=[]; save(); renderList(); flash('🗑 Inventario cancellato','ok');
};
function dl(data,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();}

// ── Flash ─────────────────────────────────────────────
window.flash = function(msg,type='ok') {
  document.querySelectorAll('.flash').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='flash '+type; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2800);
};

updateStats();
</script>
</body>
</html>
