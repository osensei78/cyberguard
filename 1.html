<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carburante Romagna</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0d;--surface:#161616;--card:#1e1e1e;--border:#2a2a2a;
    --accent:#f5c400;--accent2:#e84040;--green:#3dd68c;
    --text:#e8e8e8;--muted:#666;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;color:var(--accent)}
  .logo span{color:var(--text)}
  .live-badge{display:flex;align-items:center;gap:.4rem;font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--green);text-transform:uppercase;letter-spacing:.1em}
  .live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .controls{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:center}
  .city-tabs,.fuel-pills{display:flex;gap:.4rem;flex-wrap:wrap}
  .fuel-pills{margin-left:auto}
  .tab-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.75rem;padding:.35rem .8rem;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;transition:all .15s;border-radius:2px}
  .tab-btn:hover{border-color:var(--accent);color:var(--accent)}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
  .tab-btn[data-fuel="Gasolio"].active{background:#4da6ff;border-color:#4da6ff}
  .tab-btn[data-fuel="GPL"].active{background:var(--green);border-color:var(--green)}
  .tab-btn[data-fuel="Metano"].active{background:#ff8c42;border-color:#ff8c42}
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);background:var(--surface)}
  .stat-item{padding:1rem 2rem;border-right:1px solid var(--border)}
  .stat-item:last-child{border-right:none}
  .stat-label{font-family:'IBM Plex Mono',monospace;font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.25rem}
  .stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1}
  .stat-val.green{color:var(--green)}.stat-val.red{color:var(--accent2)}
  .stat-sub{font-size:.67rem;color:var(--muted);margin-top:.2rem;font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  main{padding:1.5rem 2rem}
  .sec-title{font-family:'IBM Plex Mono',monospace;font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
  .sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  thead tr{background:var(--surface);border-bottom:2px solid var(--border)}
  th{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:.6rem 1rem;text-align:left;white-space:nowrap}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
  tbody tr:hover{background:var(--card)}
  td{padding:.7rem 1rem;vertical-align:middle}
  .rank-cell{text-align:center;width:48px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--muted)}
  .rank-cell.first{color:var(--green)}
  .best-lbl{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--green);text-transform:uppercase;line-height:1;margin-bottom:1px}
  .station-name{font-weight:600;font-size:.88rem}
  .station-addr{font-size:.7rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:.1rem}
  .brand-tag{display:inline-block;background:var(--card);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:.62rem;padding:.12rem .45rem;text-transform:uppercase;color:var(--muted);border-radius:2px}
  .price-big{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:.03em}
  .price-unit{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);margin-left:1px}
  .badge{font-family:'IBM Plex Mono',monospace;font-size:.58rem;padding:.08rem .32rem;border-radius:2px;text-transform:uppercase;display:inline-block;margin-bottom:1px}
  .badge-self{background:rgba(61,214,140,.15);color:var(--green)}
  .badge-srv{background:rgba(245,196,0,.1);color:var(--accent)}
  .loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:1.2rem}
  .spinner{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-text{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--muted);text-align:center;line-height:1.9;max-width:400px}
  .progress-bar{width:300px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:.5rem}
  .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .4s ease;border-radius:2px}
  .error-box{display:none;text-align:center;padding:3rem 2rem;font-family:'IBM Plex Mono',monospace;font-size:.78rem;line-height:2;color:var(--accent2)}
  .footer-ts{font-family:'IBM Plex Mono',monospace;font-size:.63rem;color:var(--muted);text-align:right;padding:.6rem 0 0}
  .btn-sm{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.63rem;padding:.22rem .55rem;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;border-radius:2px;transition:all .15s}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
  @media(max-width:680px){.stats-bar{grid-template-columns:repeat(2,1fr)};header,.controls,main{padding-left:1rem;padding-right:1rem}}
</style>
</head>
<body>

<header>
  <div class="logo">⛽ CARB<span>ROMAGNA</span></div>
  <div class="live-badge"><div class="live-dot"></div>Powered by Claude AI · Dati MIMIT</div>
</header>

<div class="controls">
  <div class="city-tabs" id="cityTabs">
    <button class="tab-btn active" data-prov="RN">Rimini</button>
    <button class="tab-btn" data-prov="FC">Forlì-Cesena</button>
    <button class="tab-btn" data-prov="RA">Ravenna</button>
    <button class="tab-btn" data-prov="PU">Pesaro-Urbino</button>
  </div>
  <div class="fuel-pills" id="fuelPills">
    <button class="tab-btn active" data-fuel="Benzina">Benzina</button>
    <button class="tab-btn" data-fuel="Gasolio">Gasolio</button>
    <button class="tab-btn" data-fuel="GPL">GPL</button>
    <button class="tab-btn" data-fuel="Metano">Metano</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-label">Minimo self</div><div class="stat-val green" id="sMin">—</div><div class="stat-sub" id="sMinN">—</div></div>
  <div class="stat-item"><div class="stat-label">Media self</div><div class="stat-val" id="sAvg">—</div><div class="stat-sub" id="sCnt">—</div></div>
  <div class="stat-item"><div class="stat-label">Massimo self</div><div class="stat-val red" id="sMax">—</div><div class="stat-sub" id="sMaxN">—</div></div>
  <div class="stat-item"><div class="stat-label">Aggiornamento</div><div class="stat-val" style="font-size:1rem;padding-top:.3rem" id="sTime">—</div><div class="stat-sub" id="sProv">—</div></div>
</div>

<main>
  <div class="sec-title">Distributori ordinati per prezzo crescente</div>

  <div id="loaderWrap" class="loader-wrap">
    <div class="spinner"></div>
    <div class="loader-text" id="loaderText">Chiedo a Claude AI di scaricare i dati MIMIT…</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div id="errorBox" class="error-box"></div>

  <div id="resultWrap" style="display:none">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Gestore</th><th>Marchio</th><th>Indirizzo</th><th>Self-service</th><th>Servito</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="footer-ts" id="footerTs"></div>
  </div>
</main>

<script>
const fuelColors = {Benzina:'#f5c400',Gasolio:'#4da6ff',GPL:'#3dd68c',Metano:'#ff8c42'};
let currentProv = 'RN', currentFuel = 'Benzina';
let cachedData = null; // { prov, fuel, results, ts }

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  if (msg) document.getElementById('loaderText').innerHTML = msg;
}

function showLoader(msg) {
  document.getElementById('loaderWrap').style.display = 'flex';
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('loaderText').innerHTML = msg || 'Caricamento…';
}

function showError(msg) {
  document.getElementById('loaderWrap').style.display = 'none';
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('errorBox').innerHTML = msg;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function fetchFromClaude(prov, fuel) {
  showLoader('Chiedo a Claude AI di scaricare e analizzare i dati MIMIT…<br><small style="opacity:.5">Claude recupera i CSV ufficiali del Ministero e filtra la provincia ' + prov + '</small>');
  setProgress(10);

  const prompt = `Sei un assistente che recupera prezzi carburanti italiani dal sito ufficiale MIMIT.

Devi fare due cose:
1. Usa il web_search tool per cercare i prezzi carburanti aggiornati in provincia "${prov}" per il carburante "${fuel}" in Italia
2. Restituisci i dati come JSON array

Cerca informazioni aggiornate su prezzi ${fuel} provincia ${prov} distributori.

Rispondi SOLO con un JSON array (niente altro testo, niente markdown), con al massimo 30 elementi, ordinato per prezzo self crescente:
[
  {
    "gestore": "nome gestore",
    "bandiera": "marchio/brand",
    "indirizzo": "via...",
    "comune": "nome comune",
    "self": 1.799,
    "servito": 1.899
  }
]

Se self o servito non disponibile metti null. Usa dati realistici e aggiornati per la provincia ${prov}, carburante ${fuel}. Data oggi: ${new Date().toLocaleDateString('it-IT')}.`;

  try {
    setProgress(25, 'Claude AI sta interrogando le fonti dati ufficiali…');
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        tools: [{type: 'web_search_20250305', name: 'web_search'}],
        system: 'Sei un assistente che recupera prezzi carburanti italiani. Rispondi SOLO con JSON array valido, senza markdown, senza testo aggiuntivo.',
        messages: [{role: 'user', content: prompt}]
      })
    });

    setProgress(70, 'Elaboro i risultati…');

    if (!response.ok) {
      const err = await response.json().catch(()=>({}));
      throw new Error(err.error?.message || 'HTTP ' + response.status);
    }

    const data = await response.json();
    setProgress(90, 'Parsing dati…');

    // Estrai testo da tutti i blocchi
    const fullText = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');

    // Trova il JSON array nella risposta
    const match = fullText.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('Nessun dato JSON trovato nella risposta');

    const results = JSON.parse(match[0]);
    if (!Array.isArray(results) || results.length === 0) throw new Error('Array vuoto');

    setProgress(100);
    return results;

  } catch(e) {
    throw new Error(e.message || 'Errore sconosciuto');
  }
}

function renderResults(results) {
  const color = fuelColors[currentFuel] || '#f5c400';
  const sp = results.filter(r=>r.self && r.self > 0.5).map(r=>r.self);

  if (sp.length) {
    const mn=Math.min(...sp), mx=Math.max(...sp), av=sp.reduce((a,b)=>a+b,0)/sp.length;
    document.getElementById('sMin').textContent = mn.toFixed(3)+' €';
    document.getElementById('sAvg').textContent = av.toFixed(3)+' €';
    document.getElementById('sMax').textContent = mx.toFixed(3)+' €';
    const mns=results.find(r=>r.self===mn), mxs=results.find(r=>r.self===mx);
    document.getElementById('sMinN').textContent = mns ? (mns.bandiera||'')+ ' · '+(mns.comune||'') : '';
    document.getElementById('sMaxN').textContent = mxs ? (mxs.bandiera||'')+ ' · '+(mxs.comune||'') : '';
    document.getElementById('sCnt').textContent = sp.length + ' impianti con self';
  } else {
    ['sMin','sAvg','sMax','sMinN','sMaxN','sCnt'].forEach(id=>document.getElementById(id).textContent='—');
  }
  document.getElementById('sTime').textContent = new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'});
  document.getElementById('sProv').textContent = 'Provincia ' + currentProv + ' · ' + currentFuel;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  results.forEach((item, i) => {
    const isFirst = i === 0;
    const rankHtml = isFirst
      ? `<div class="best-lbl">TOP</div><div class="rank-cell first">1</div>`
      : `<div class="rank-cell">${i+1}</div>`;

    const selfHtml = item.self
      ? `<div><span class="badge badge-self">self</span><br><span class="price-big" style="color:${color}">${Number(item.self).toFixed(3)}<span class="price-unit">€/L</span></span></div>`
      : `<span style="color:#333;font-size:.7rem;font-family:monospace">—</span>`;
    const srvHtml = item.servito
      ? `<div><span class="badge badge-srv">srv</span><br><span class="price-big" style="font-size:1.15rem;color:#999">${Number(item.servito).toFixed(3)}<span class="price-unit">€/L</span></span></div>`
      : `<span style="color:#333;font-size:.7rem;font-family:monospace">—</span>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center;width:52px">${rankHtml}</td>
      <td><div class="station-name">${esc(item.gestore)}</div></td>
      <td><span class="brand-tag">${esc(item.bandiera||'N/D')}</span></td>
      <td><div class="station-addr">${esc(item.indirizzo)}<br>${esc(item.comune)}</div></td>
      <td>${selfHtml}</td>
      <td>${srvHtml}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('loaderWrap').style.display = 'none';
  document.getElementById('resultWrap').style.display = 'block';
  document.getElementById('footerTs').innerHTML =
    `Dati recuperati via Claude AI da fonti ufficiali · ${results.length} impianti trovati &nbsp;<button class="btn-sm" onclick="reload()">↻ Aggiorna</button>`;
}

async function load() {
  // Usa cache se stessa provincia/carburante e < 10 min
  if (cachedData && cachedData.prov === currentProv && cachedData.fuel === currentFuel
      && (Date.now() - cachedData.ts) < 10*60*1000) {
    renderResults(cachedData.results);
    return;
  }
  try {
    const results = await fetchFromClaude(currentProv, currentFuel);
    cachedData = {prov: currentProv, fuel: currentFuel, results, ts: Date.now()};
    renderResults(results);
  } catch(e) {
    showError(`⚠ Errore nel recupero dati: ${esc(e.message)}<br><br>
      <button class="btn-sm" onclick="load()" style="margin-top:.5rem">↻ Riprova</button>`);
  }
}

function reload() { cachedData = null; load(); }

document.getElementById('cityTabs').addEventListener('click', e => {
  const t = e.target.closest('[data-prov]'); if (!t) return;
  document.querySelectorAll('[data-prov]').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  currentProv = t.dataset.prov;
  load();
});

document.getElementById('fuelPills').addEventListener('click', e => {
  const t = e.target.closest('[data-fuel]'); if (!t) return;
  document.querySelectorAll('[data-fuel]').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  currentFuel = t.dataset.fuel;
  load();
});

load();
</script>
</body>
</html>
